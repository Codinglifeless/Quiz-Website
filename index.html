<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Website | Coding With Ruba</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="quiz-container">
        <h1 class="quiz-title">Web Development Quiz</h1>
        <p class="quiz-description">Please choose the category</p>

        <div class="category-grid">
            <button class="category-btn" onclick="selectCategory('html/quiz_start')">HTML</button>
            <button class="category-btn" onclick="selectCategory('css/quiz_start')">CSS</button>
            <button class="category-btn" onclick="selectCategory('js/quiz_start')">JS</button>
            <button class="category-btn" onclick="selectCategory('php/quiz_start')">PHP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
